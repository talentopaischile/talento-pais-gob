name: Talento País V2 — Actualización semanal de datos

on:
  schedule:
    # Martes 8:00 AM Chile (11:00 UTC) — un día después del pipeline del repo original
    - cron: '0 11 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  datos:
    name: Regenerar informe.json desde talento-pais-original
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout de este repo
        uses: actions/checkout@v4

      - name: Checkout del repo de datos (privado)
        # Requiere el secret DATA_REPO_TOKEN: un fine-grained PAT con permiso
        # de lectura de contenidos sobre talentopaischile/talento-pais-original.
        uses: actions/checkout@v4
        with:
          repository: talentopaischile/talento-pais-original
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: fuente

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar informe.json
        run: python scripts/generar_informe.py --local fuente

      - name: Commitear datos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/informe.json
          git diff --staged --quiet || git commit -m "chore: datos semanales actualizados"
          git push || true
